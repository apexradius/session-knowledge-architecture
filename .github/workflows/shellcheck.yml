name: Shellcheck

on:
  pull_request:
  push:
    branches-ignore:
      - "renovate/**"
      - "dependabot/**"

concurrency:
  group: shellcheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
